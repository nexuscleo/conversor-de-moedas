<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="style.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
        <link href="./img/favicon.png" type="image/png" sizes="16x16" rel="icon">
        <title>Conversor de Moedas PRO</title>
    </head>

<body>
        <img class="logo" src="./img/moeda-colorida.gif" alt="Logotipo animado do conversor de moedas">
        <main>
            <div class="input-group">
                <label for="valor-entrada">Valor a converter</label>
                <input id="valor-entrada" class="valor-entrada" placeholder="Ex: 1000.00" type="number" min="0" step="1" required>
            </div>

            <div class="input-group">
                <label for="converter-de">Converter <b>de</b></label>
                <select id="converter-de" class="converter-de">
                    <option value="real">R$ Real Brasileiro</option>
                    <option value="euro">€ Euro</option>
                    <option value="yuan">¥ Yuan Chinês</option>
                    <option value="dollar">US$ Dólar Americano</option>
                    <option value="bitcoin">₿ Bitcoin</option>
                </select>
            </div>

            <div class="input-group">
                <label for="converter-para">Converter <b>para</b></label>
                <select id="converter-para" class="converter-para">
                    <option value="dollar">US$ Dólar Americano</option>
                    <option value="real">R$ Real Brasileiro</option>
                    <option value="euro">€ Euro</option>
                    <option value="yuan">¥ Yuan Chinês</option>
                    <option value="bitcoin">₿ Bitcoin</option>
                </select>
            </div>

            <button class="botao-converter">Converter</button>

            <section class="result-container" aria-live="polite">
                <div class="moeda-box">
                    <img class="logo-moeda-de" src="./img/brasil.png" alt="Bandeira representando a moeda de origem">
                    <p class="nome-moeda-de">Real Brasileiro</p>
                    <p class="valor-moeda-de">R$ 0,00</p>
                </div>
                
                <img class="img-cambio" src="./img/transacao-estatica.png" alt="Seta indicando conversão" aria-hidden="true">
                
                <div class="moeda-box">
                    <img class="logo-moeda-para" src="./img/dollar.png" alt="Bandeira representando a moeda de destino">
                    <p class="nome-moeda-para">Dólar Americano</p>
                    <p class="valor-moeda-para">US$ 0,00</p>
                </div>
            </section>
        </main>
        
        <script src="script.js"></script>
    </body>
</html>
